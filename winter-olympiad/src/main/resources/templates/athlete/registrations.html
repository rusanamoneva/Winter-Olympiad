<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Registrations</title>
</head>
<body>
<div th:replace="fragments/header :: athleteHeader"></div>

<h1>My Registrations</h1>

<div th:if="${#lists.isEmpty(registrations)}">
    <p>You are not registered for any competition yet.</p>
</div>

<table th:if="${!#lists.isEmpty(registrations)}" border="1" cellpadding="6" cellspacing="0">
    <thead>
    <tr>
        <th>Competition</th>
        <th>Competition ID</th>
        <th>Registered At</th>
        <th>Status</th>
        <th>Details</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="registration : ${registrations}">
        <td th:text="${registration.competitionName}">Competition</td>
        <td th:text="${registration.competitionId}">1</td>
        <td th:text="${#temporals.format(registration.registeredAt, 'dd.MM.yyyy HH:mm')}">01.01.2030 12:00</td>
        <td th:text="${registration.status}">REGISTERED</td>
        <td>
            <a th:href="@{/competitions/{id}(id=${registration.competitionId})}">Open</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
