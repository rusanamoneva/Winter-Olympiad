<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Olympic Games Form</title>
</head>
<body>
<div th:replace="fragments/header :: adminHeader"></div>

<h1 th:text="${pageTitle}">Olympic Games Form</h1>

<p><a href="/admin/olympics">Back to Olympic Games Management</a></p>

<form th:action="${formAction}" th:object="${olympicsForm}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <p th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}" th:text="${error}" style="color: red;"></p>

    <label>Name
        <input type="text" th:field="*{name}"/>
    </label>
    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: red;"></span>
    <br/>

    <label>Location
        <input type="text" th:field="*{location}"/>
    </label>
    <span th:if="${#fields.hasErrors('location')}" th:errors="*{location}" style="color: red;"></span>
    <br/>

    <label>Start Date
        <input type="date" th:field="*{startDate}"/>
    </label>
    <span th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}" style="color: red;"></span>
    <br/>

    <label>End Date
        <input type="date" th:field="*{endDate}"/>
    </label>
    <span th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}" style="color: red;"></span>
    <br/>

    <button type="submit" th:text="${submitLabel}">Save</button>
</form>

</body>
</html>
