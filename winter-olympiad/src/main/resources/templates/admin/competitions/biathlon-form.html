<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Biathlon Competition Form</title>
</head>
<body>
<div th:replace="fragments/header :: adminHeader"></div>

<h1 th:text="${pageTitle}">Biathlon Competition Form</h1>

<p><a href="/admin/competitions">Back to Competitions Management</a></p>

<form th:action="${formAction}" th:object="${competitionForm}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <p th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}" th:text="${error}" style="color: red;"></p>

    <label>Name
        <input type="text" th:field="*{name}"/>
    </label>
    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: red;"></span>
    <br/>

    <label>Gender Category
        <select th:field="*{genderCategory}">
            <option value="MALE">MALE</option>
            <option value="FEMALE">FEMALE</option>
        </select>
    </label>
    <span th:if="${#fields.hasErrors('genderCategory')}" th:errors="*{genderCategory}" style="color: red;"></span>
    <br/>

    <label>Minimum Age
        <input type="number" min="0" th:field="*{minimumAge}"/>
    </label>
    <span th:if="${#fields.hasErrors('minimumAge')}" th:errors="*{minimumAge}" style="color: red;"></span>
    <br/>

    <label>Competition Date
        <input type="date" th:field="*{competitionDate}"/>
    </label>
    <span th:if="${#fields.hasErrors('competitionDate')}" th:errors="*{competitionDate}" style="color: red;"></span>
    <br/>

    <div th:if="${!editMode}">
        <label>Olympic Games
            <select th:field="*{olympicGamesId}">
                <option value="">Select Olympic Games</option>
                <option th:each="games : ${olympicsOptions}" th:value="${games.id}" th:text="${games.name}"></option>
            </select>
        </label>
    </div>
    <div th:if="${editMode}">
        <input type="hidden" th:field="*{olympicGamesId}"/>
        <label>Olympic Games ID
            <input type="text" th:value="*{olympicGamesId}" readonly/>
        </label>
    </div>
    <span th:if="${#fields.hasErrors('olympicGamesId')}" th:errors="*{olympicGamesId}" style="color: red;"></span>
    <br/>

    <label>Penalty Per Miss (seconds)
        <input type="number" step="0.001" min="0" th:field="*{penaltyPerMissSeconds}"/>
    </label>
    <span th:if="${#fields.hasErrors('penaltyPerMissSeconds')}" th:errors="*{penaltyPerMissSeconds}" style="color: red;"></span>
    <br/>

    <label>Number Of Shootings
        <input type="number" min="1" th:field="*{numberOfShootings}"/>
    </label>
    <span th:if="${#fields.hasErrors('numberOfShootings')}" th:errors="*{numberOfShootings}" style="color: red;"></span>
    <br/>

    <label>Number Of Laps
        <input type="number" min="1" th:field="*{numberOfLaps}"/>
    </label>
    <span th:if="${#fields.hasErrors('numberOfLaps')}" th:errors="*{numberOfLaps}" style="color: red;"></span>
    <br/>

    <button type="submit" th:text="${submitLabel}">Save</button>
</form>

</body>
</html>
